name: Purge Secrets from Git History

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'Target repository URL (https://github.com/org/repo)'
        required: true
        type: string
      target_branch:
        description: 'Branch to sanitize'
        required: true
        type: string
      target_secret:
        description: 'Secret string to remove from history'
        required: true
        type: string

jobs:
  purge-history:
    runs-on: ubuntu-latest

    steps:
      # Check out this repo so sanitize_history.py is available
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      # Clone the target repo and create the sanitized branch from the target branch.
      # REPO_ACCESS_TOKEN must be a PAT with read/write access to the target repo.
      - name: Clone and prepare target repository
        env:
          REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          REPO_URL: ${{ inputs.repo_url }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          git config --global url."https://x-access-token:${REPO_ACCESS_TOKEN}@github.com/".insteadOf "https://github.com/"
          git clone "$REPO_URL" target_repo
          cd target_repo
          git checkout "$TARGET_BRANCH"
          git checkout -b "sanitized/${TARGET_BRANCH}"

      - name: Run Sanitizer Script
        env:
          WORKSPACE_DIR: ${{ github.workspace }}/target_repo
          NEW_BRANCH: sanitized/${{ inputs.target_branch }}
          TARGET_SECRET: ${{ inputs.target_secret }}
        run: python sanitize_history.py

      - name: Push sanitized branch
        env:
          REPO_URL: ${{ inputs.repo_url }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          cd target_repo
          git remote add origin "$REPO_URL"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin "sanitized/${TARGET_BRANCH}" --force
